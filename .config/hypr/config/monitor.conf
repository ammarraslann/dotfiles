# ┃                     Monitor Configuration                   ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# monitor = name, resolution@hz, position, scale
monitor = HDMI-A-1, 1920x1080@120, 0x0,    1
monitor = eDP-1,    1920x1080@120, 1920x0,  1

# Fallback for unknown monitors (e.g. T7 on a different machine)
monitor = , preferred, auto, 1

# Workspace assignments
workspace = 1, monitor:HDMI-A-1
workspace = 2, monitor:eDP-1

# XWayland scaling (uncomment if Steam/XWayland apps look too large)
# xwayland {
