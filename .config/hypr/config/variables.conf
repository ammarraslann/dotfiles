# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Variables Configuration                  ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = ~/.config/hypr/config/colors.conf

general {
    gaps_in = 5
    gaps_out = 7
    border_size = 4
    col.active_border = $border_active $border_active2 45deg
    col.inactive_border = $border_inactive
    layout = dwindle

    snap {
        enabled = true
    }
}

group {
    col.border_active          = $burnt_sienna
    col.border_inactive        = $warm_muted
    col.border_locked_active   = $sandy_brown
    col.border_locked_inactive = $dark_warm

    groupbar {
        font_family         = "Iosevka Nerd Font"
        text_color          = $warm_text
        col.active          = $burnt_sienna
        col.inactive        = $warm_muted
        col.locked_active   = $sandy_brown
        col.locked_inactive = $dark_warm
    }
}

misc {
    font_family           = "Iosevka Nerd Font"
    splash_font_family    = "Iosevka Nerd Font"
    disable_hyprland_logo = true
    col.splash            = $burnt_sienna
    background_color      = $dark_warm
    enable_swallow        = true
    swallow_regex         = ^(thunar)$
    focus_on_activate     = true
    vrr                   = 2
}

render {
    direct_scanout = true
}

dwindle {
    special_scale_factor = 0.8
    pseudotile           = true
    preserve_split       = true
}

master {
    new_status           = master
    special_scale_factor = 0.8
}

# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                         Gestures                            ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Three-finger swipe left/right → switch workspace (macOS/KDE style)
gestures {
    workspace_swipe                    = true
    workspace_swipe_fingers            = 3
    workspace_swipe_distance           = 250
    workspace_swipe_invert             = true
    workspace_swipe_min_speed_to_force = 20
    workspace_swipe_cancel_ratio       = 0.4
    workspace_swipe_create_new         = false
    workspace_swipe_forever            = true
}

# Touch gesture actions (close, fullscreen, float)
gesture = 3, down, close
gesture = 3, up, fullscreen
gesture = 3, left, float
