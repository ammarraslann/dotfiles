# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                         Keybinds                            ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = ~/.config/hypr/config/defaults.conf

bind = SUPER, W, exec, ~/.config/hypr/scripts/wallpaper-switch.sh

bindd = $mainMod, RETURN, Opens your preferred terminal emulator, exec, $terminal
bindd = $mainMod, E, Opens your preferred filemanager, exec, $filemanager
bindd = $mainMod, B, Opens your preferred browser, exec, $browser
bindd = $mainMod, C, Opens your preferred editor, exec, $editor
bindd = $mainMod, Q, Closes current window, killactive,
bindd = $mainMod SHIFT, M, Exits Hyprland, exec, loginctl terminate-user ""
bindd = $mainMod, V, Toggle floating/tiling, togglefloating,
bindd = $mainMod, SPACE, App launcher, exec, $applauncher --show drun
bindd = $mainMod, F, Toggle fullscreen, fullscreen
bindd = $mainMod, Y, Pin current window, pin
bindd = $mainMod, J, Toggle split, togglesplit,
bindd = $mainMod, L, Lock screen, exec, $locker
bindd = $mainMod, O, Reload waybar, exec, killall -SIGUSR2 waybar
bindd = $mainMod, BACKSPACE, Clipboard history, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# ======= Screenshots =======

bindd = ,    Print, Screenshot region,  exec, $shot-region
bindd = CTRL, Print, Screenshot window, exec, $shot-window
bindd = ALT,  Print, Screenshot display, exec, $shot-screen

# ======= Grouping Windows =======

bindd = $mainMod, K, Toggle window group, togglegroup,
bindd = $mainMod, Tab, Next window in group, changegroupactive, f

# ======= Toggle Gaps =======

bindd = $mainMod SHIFT, G, Restore default gaps, exec, hyprctl --batch "keyword general:gaps_out 7;keyword general:gaps_in 5"
bindd = $mainMod, G, Remove gaps, exec, hyprctl --batch "keyword general:gaps_out 0;keyword general:gaps_in 0"

# ======= Volume — SwayOSD =======

bindle = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindle = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl  = , XF86AudioMute,        exec, swayosd-client --output-volume mute-toggle
bindl  = , XF86AudioMicMute,     exec, swayosd-client --input-volume mute-toggle

# ======= Playback =======

bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# ======= Brightness — per-monitor script =======
# Routes to brightnessctl (built-in) or ddcutil (LG external via DDC/CI)

bindle = , XF86MonBrightnessUp,   exec, ~/.local/bin/brightness-adjust up 5
bindle = , XF86MonBrightnessDown, exec, ~/.local/bin/brightness-adjust down 5

# ======= Window Movement =======

bindd = $mainMod SHIFT, H, Move window left,  movewindow, l
bindd = $mainMod SHIFT, L, Move window right, movewindow, r
bindd = $mainMod SHIFT, K, Move window up,    movewindow, u
bindd = $mainMod SHIFT, J, Move window down,  movewindow, d

# ======= Focus Movement =======

bindd = $mainMod, H, Focus left,  movefocus, l
bindd = $mainMod, L, Focus right, movefocus, r
bindd = $mainMod, K, Focus up,    movefocus, u
bindd = $mainMod, J, Focus down,  movefocus, d

# ======= Mouse Drag =======
# SUPER + drag → move (existing)
# SHIFT + drag → move (Windows-familiar)
# ALT   + drag → move (GNOME-familiar)
# SUPER + right drag → resize
# ALT   + right drag → resize (alternative)

bindm = $mainMod, mouse:272, movewindow
bindm = SHIFT,    mouse:272, movewindow
bindm = ALT,      mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = ALT,      mouse:273, resizewindow

# ======= Resize Submap =======

bindd = $mainMod, R, Enter resize mode, submap, resize
submap = resize
bindd = , right, Resize right, resizeactive,  15 0
bindd = , left,  Resize left,  resizeactive, -15 0
bindd = , up,    Resize up,    resizeactive,  0 -15
bindd = , down,  Resize down,  resizeactive,  0  15
bindd = , l,     Resize right, resizeactive,  15 0
bindd = , h,     Resize left,  resizeactive, -15 0
bindd = , k,     Resize up,    resizeactive,  0 -15
bindd = , j,     Resize down,  resizeactive,  0  15
bindd = , escape, Exit resize mode, submap, reset
submap = reset

bindd = $mainMod CTRL SHIFT, right, Resize right, resizeactive,  15 0
bindd = $mainMod CTRL SHIFT, left,  Resize left,  resizeactive, -15 0
bindd = $mainMod CTRL SHIFT, up,    Resize up,    resizeactive,  0 -15
bindd = $mainMod CTRL SHIFT, down,  Resize down,  resizeactive,  0  15
bindd = $mainMod CTRL SHIFT, l,     Resize right, resizeactive,  15 0
bindd = $mainMod CTRL SHIFT, h,     Resize left,  resizeactive, -15 0
bindd = $mainMod CTRL SHIFT, k,     Resize up,    resizeactive,  0 -15
bindd = $mainMod CTRL SHIFT, j,     Resize down,  resizeactive,  0  15

# ======= Move Window to Workspace =======

bindd = $mainMod CTRL, 1, Move to WS 1,  movetoworkspace, 1
bindd = $mainMod CTRL, 2, Move to WS 2,  movetoworkspace, 2
bindd = $mainMod CTRL, 3, Move to WS 3,  movetoworkspace, 3
bindd = $mainMod CTRL, 4, Move to WS 4,  movetoworkspace, 4
bindd = $mainMod CTRL, 5, Move to WS 5,  movetoworkspace, 5
bindd = $mainMod CTRL, 6, Move to WS 6,  movetoworkspace, 6
bindd = $mainMod CTRL, 7, Move to WS 7,  movetoworkspace, 7
bindd = $mainMod CTRL, 8, Move to WS 8,  movetoworkspace, 8
bindd = $mainMod CTRL, 9, Move to WS 9,  movetoworkspace, 9
bindd = $mainMod CTRL, 0, Move to WS 10, movetoworkspace, 10
bindd = $mainMod CTRL, left,  Move to prev WS, movetoworkspace, -1
bindd = $mainMod CTRL, right, Move to next WS, movetoworkspace, +1

bindd = $mainMod SHIFT, 1, Silent to WS 1,  movetoworkspacesilent, 1
bindd = $mainMod SHIFT, 2, Silent to WS 2,  movetoworkspacesilent, 2
bindd = $mainMod SHIFT, 3, Silent to WS 3,  movetoworkspacesilent, 3
bindd = $mainMod SHIFT, 4, Silent to WS 4,  movetoworkspacesilent, 4
bindd = $mainMod SHIFT, 5, Silent to WS 5,  movetoworkspacesilent, 5
bindd = $mainMod SHIFT, 6, Silent to WS 6,  movetoworkspacesilent, 6
bindd = $mainMod SHIFT, 7, Silent to WS 7,  movetoworkspacesilent, 7
bindd = $mainMod SHIFT, 8, Silent to WS 8,  movetoworkspacesilent, 8
bindd = $mainMod SHIFT, 9, Silent to WS 9,  movetoworkspacesilent, 9
bindd = $mainMod SHIFT, 0, Silent to WS 10, movetoworkspacesilent, 10

# ======= Workspace Switching =======

bindd = $mainMod, 1, Workspace 1,  workspace, 1
bindd = $mainMod, 2, Workspace 2,  workspace, 2
bindd = $mainMod, 3, Workspace 3,  workspace, 3
bindd = $mainMod, 4, Workspace 4,  workspace, 4
bindd = $mainMod, 5, Workspace 5,  workspace, 5
bindd = $mainMod, 6, Workspace 6,  workspace, 6
bindd = $mainMod, 7, Workspace 7,  workspace, 7
bindd = $mainMod, 8, Workspace 8,  workspace, 8
bindd = $mainMod, 9, Workspace 9,  workspace, 9
bindd = $mainMod, 0, Workspace 10, workspace, 10

bindd = $mainMod, PERIOD,     Next workspace,     workspace, e+1
bindd = $mainMod, COMMA,      Prev workspace,     workspace, e-1
bindd = $mainMod, mouse_down, Next workspace,     workspace, e+1
bindd = $mainMod, mouse_up,   Prev workspace,     workspace, e-1
bindd = $mainMod, slash,      Previous (history), workspace, previous

# ======= Special Workspaces =======

bindd = $mainMod,           minus, Move to special,    movetoworkspace,        special
bindd = $mainMod,           equal, Toggle special,     togglespecialworkspace, special
bindd = $mainMod,              F1, Toggle scratchpad,  togglespecialworkspace, scratchpad
bindd = $mainMod ALT SHIFT,    F1, Move to scratchpad, movetoworkspacesilent,  special:scratchpad

# ======= Bind Settings =======

binds {
    allow_workspace_cycles            = true
    workspace_back_and_forth          = true
    workspace_center_on               = 1
    movefocus_cycles_fullscreen       = true
    window_direction_monitor_fallback = true
}
