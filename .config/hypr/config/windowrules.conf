# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                   Window Rules Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# ── Float rules ───────────────────────────────────────────────────────────────
windowrule = float, class:^(org.pulseaudio.pavucontrol)$
windowrule = float, class:^(blueman-manager)$
windowrule = float, class:^(zenity)$
windowrule = float, title:^(Picture-in-Picture)$
windowrule = float, class:^(xdg-desktop-portal-gtk|xdg-desktop-portal-hyprland)(.*)$
windowrule = float, class:^(hyprpolkitagent|polkit-gnome-authentication-agent-1)(.*)$

# ── Picture-in-Picture ────────────────────────────────────────────────────────
windowrule = size 960 540, title:^(Picture-in-Picture)$
windowrule = pin,           title:^(Picture-in-Picture)$

# ── Opacity ───────────────────────────────────────────────────────────────────
windowrule = opacity 0.92, class:^(dolphin)$

# ── Gaming ────────────────────────────────────────────────────────────────────
windowrule = float,               class:^(steam_app_)
windowrule = fullscreen,          class:^(steam_app_)
windowrule = immediate,           class:^(steam_app_)
windowrule = idle_inhibit always, class:^(steam_app_)
windowrule = no_initial_focus,    class:^(steam_app_)
windowrule = suppressevent maximize, class:.*

# ── Smart gaps ────────────────────────────────────────────────────────────────
workspace = w[tv1-10], gapsout:5, gapsin:3
workspace = f[1], gapsout:5, gapsin:3

# ── Layer animations ──────────────────────────────────────────────────────────
layerrule = animation slide down, waybar
layerrule = animation fade 50%,   wallpaper
