source = ~/.config/hypr/config/colors.conf

decoration {
    rounding         = 8
    active_opacity   = 1.0
    inactive_opacity = 0.95

    blur {
        enabled           = true
        size              = 8
        passes            = 2
        xray              = true
        new_optimizations = true
    }

    shadow {
        enabled      = true
        range        = 8
        render_power = 2
        color        = rgba(00000066)
    }
}
